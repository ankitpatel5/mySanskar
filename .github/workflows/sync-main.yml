name: Sync staging → main

# Runs every time staging is pushed to GitHub.
# Fast-forward merges main to match staging so the two branches never drift.
# Vercel production deploy is triggered separately via "npm run ship" locally,
# or you can add a VERCEL_TOKEN secret to also deploy automatically from here.

on:
  push:
    branches:
      - staging

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward main to staging
        run: |
          git checkout main
          git merge origin/staging --ff-only
          git push origin main
