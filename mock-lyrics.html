<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: flex-end; min-height: 100vh; }

.sheet {
  width: 390px;
  height: 780px;
  background: #1a1a1a;
  border-radius: 24px 24px 0 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 28px 36px;
  position: relative;
  overflow: hidden;
}

.handle { width: 36px; height: 4px; background: #444; border-radius: 2px; margin-bottom: 16px; }

.close { position: absolute; top: 20px; right: 20px; color: #888; font-size: 22px; }

.art {
  width: 220px; height: 220px;
  background: linear-gradient(135deg, #2d4a2d, #4a7a4a);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 64px;
  margin: 8px 0 20px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}

.song-title { font-size: 19px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 4px; }
.song-sub   { font-size: 13px; color: #888; text-align: center; margin-bottom: 20px; }

.seek-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-bottom: 6px; position: relative; }
.seek-fill { width: 38%; height: 100%; background: #fff; border-radius: 2px; }
.seek-dot { width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; left: calc(38% - 6px); top: -4px; }
.times { display: flex; justify-content: space-between; font-size: 11px; color: #888; width: 100%; margin-bottom: 24px; }

.controls { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 24px; }
.ctrl-side { color: #aaa; font-size: 22px; padding: 8px; }
.ctrl-main { width: 64px; height: 64px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; color: #000; }
.ctrl-sec  { color: #fff; font-size: 28px; padding: 8px; }

.extras { display: flex; gap: 8px; justify-content: center; width: 100%; margin-top: auto; }
.extra-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 16px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  color: #ddd;
  font-size: 13px; font-weight: 500;
  border: none; cursor: pointer;
}

/* THE LYRICS BUTTON — highlighted */
.extra-btn.lyrics-btn {
  background: rgba(74,170,74,0.15);
  border: 1.5px solid rgba(74,170,74,0.5);
  color: #4aaa4a;
  position: relative;
}
.pulse-ring {
  position: absolute;
  inset: -4px;
  border-radius: 999px;
  border: 2px solid rgba(74,170,74,0.4);
  animation: pulse 2s ease-out infinite;
}
@keyframes pulse {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.3); }
}

.label {
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  background: #4aaa4a;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 999px;
  white-space: nowrap;
}

.arrow {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  color: #4aaa4a;
  font-size: 18px;
}
</style>
</head>
<body>
<div class="sheet">
  <div class="handle"></div>
  <div class="close">⌄</div>

  <div class="art">🙏</div>

  <div class="song-title">Bhagya Jagya</div>
  <div class="song-sub">Album Name</div>

  <div style="width:100%">
    <div class="seek-bar">
      <div class="seek-fill"></div>
      <div class="seek-dot"></div>
    </div>
    <div class="times"><span>1:23</span><span>4:10</span></div>
  </div>

  <div class="controls">
    <span class="ctrl-side">⇄</span>
    <span class="ctrl-sec">⏮</span>
    <div class="ctrl-main">⏸</div>
    <span class="ctrl-sec">⏭</span>
    <span class="ctrl-side">↺</span>
  </div>

  <div class="extras">
    <button class="extra-btn">☰ Queue</button>
    <button class="extra-btn">＋ Add to…</button>
    <button class="extra-btn lyrics-btn" style="position:relative">
      <div class="pulse-ring"></div>
      ≡ Lyrics
      <div class="label">appears here ↑</div>
    </button>
  </div>
</div>
</body>
</html>
